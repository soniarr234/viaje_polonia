<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viaje a Polonia</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- CABECERA: Información crítica (Cuenta atrás) -->
    <header class="app-header">
        <h1>Polonia en Navidad</h1>
        <div id="countdown" class="badge"></div>
    </header>

    <!-- CONTENEDOR PRINCIPAL: Vistas de la SPA -->
    <main class="app-content">
        
        <!-- Pestaña 1: Cronograma (Activa por defecto) -->
        <section id="tab-itinerary" class="view active">
            <h2>Ruta Día a Día</h2>
            <div class="timeline" id="timeline-container"></div>
        </section>

        <!-- Pestaña 2: Mapas y Geolocalización -->
        <section id="tab-map" class="view">
            <div class="map-wrapper">
                <iframe 
                    src="https://google.com/maps/d/u/0/embed?mid=133_DZMUQInXpMVs6ErvqQsp6S4PPC_s&ehbc=2E312F&noprof=1" 
                    width="100%" 
                    height="100%" 
                    style="border:0;" 
                    allowfullscreen="" 
                    loading="lazy">
                </iframe>
            </div>
        </section>

        <!-- Pestaña 3: Finanzas y Conversor -->
        <section id="tab-finance" class="view">
            <h2>Gastos y Divisa</h2>
            <div class="converter-box">
                <input type="number" id="eur-input" placeholder="EUR (€)">
                <span class="equals">=</span>
                <span id="pln-output">0.00 PLN</span>
            </div>
            <div id="budget-summary"></div>
        </section>

        <!-- Pestaña 4: Documentos y Checklist -->
        <section id="tab-docs" class="view">
            <h2>Checklist y Reservas</h2>
            <ul class="checklist" id="pack-list"></ul>
        </section>

    </main>

    <!-- NAVEGACIÓN INFERIOR (Estilo App Móvil) -->
        <!-- NAVEGACIÓN INFERIOR (Estilo App Móvil) -->
    <nav class="bottom-nav">
        <button class="nav-btn active" data-target="tab-itinerary">📅 <span>Ruta</span></button>
        <button class="nav-btn" data-target="tab-map"><svg xmlns="http://www.w3.org/2000/svg" width="1.5em" height="1.5em" viewBox="0 0 24 24"><path fill="red" d="M12 2C7.589 2 4 5.589 4 9.995C3.971 16.44 11.696 21.784 12 22c0 0 8.029-5.56 8-12c0-4.411-3.589-8-8-8m0 12c-2.21 0-4-1.79-4-4s1.79-4 4-4s4 1.79 4 4s-1.79 4-4 4"/></svg> <span>Mapa</span></button>
        <button class="nav-btn" data-target="tab-finance"><svg xmlns="http://www.w3.org/2000/svg" width="1.5em" height="1.5em" viewBox="0 0 24 24"><path fill="green" d="M9 8h6a1 1 0 0 0 0-2H9a1 1 0 0 0 0 2m.47-3.5a.5.5 0 0 0 .5.44H14a.51.51 0 0 0 .5-.44a9.2 9.2 0 0 1 1.2-3a.47.47 0 0 0-.07-.57a.5.5 0 0 0-.53-.18l-1.86.8a.23.23 0 0 1-.2 0a.25.25 0 0 1-.14-.13L12.46.31a.5.5 0 0 0-.92 0l-.44 1.11a.25.25 0 0 1-.14.13a.23.23 0 0 1-.2 0L8.9.75a.5.5 0 0 0-.56.13a.47.47 0 0 0-.07.57a9.2 9.2 0 0 1 1.2 3.05m5.97 4.62a.58.58 0 0 0-.36-.12H8.92a.58.58 0 0 0-.36.12c-2.55 2-5.4 5.4-5.4 8.4C3.16 21.75 5.52 24 12 24s8.84-2.25 8.84-6.48c0-3-2.84-6.45-5.4-8.4M13 20.13a.26.26 0 0 0-.21.25v.37a.75.75 0 0 1-1.5 0v-.32a.25.25 0 0 0-.25-.25h-.59a.75.75 0 0 1 0-1.5h2.15a.67.67 0 0 0 .25-1.3l-2.18-.87a2.16 2.16 0 0 1 .33-4.14a.26.26 0 0 0 .21-.25v-.37a.75.75 0 0 1 1.5 0v.32a.25.25 0 0 0 .25.25h.59a.75.75 0 0 1 0 1.5h-2.11a.67.67 0 0 0-.25 1.3l2.18.87a2.16 2.16 0 0 1-.37 4.14"/></svg> <span>Dinero</span></button>
        <button class="nav-btn" data-target="tab-docs">📋 <span>Docs</span></button>
    </nav>

    <script src="js/app.js"></script>
</body>
</html>

</body>
</html>
