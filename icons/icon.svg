<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">

  <!-- Fondo -->
  <rect width="512" height="512" rx="120" fill="#0f172a"/>

  <!-- Pierogi (forma principal) -->
  <path d="M120 260 
           Q256 120 392 260 
           Q256 360 120 260 Z"
        fill="#fbbf24"
        stroke="#eab308"
        stroke-width="12"/>

  <!-- Borde "dobladito" -->
  <path d="M140 260 
           Q256 150 372 260"
        fill="none"
        stroke="#d97706"
        stroke-width="10"
        stroke-linecap="round"/>

  <!-- Detalles tipo pliegues -->
  <circle cx="200" cy="230" r="6" fill="#d97706"/>
  <circle cx="240" cy="210" r="6" fill="#d97706"/>
  <circle cx="280" cy="210" r="6" fill="#d97706"/>
  <circle cx="320" cy="230" r="6" fill="#d97706"/>

</svg>
